<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSE Character Creator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>⚔️ OSE Character Creator</h1>
    </header>

    <main>
      <form id="gen-form">
        <div class="options-grid">

          <div class="option-group">
            <label>Ruleset <span class="help" tabindex="0" aria-label="Classic Fantasy uses the standard B/X classes: Cleric, Dwarf, Elf, Fighter, Halfling, Magic-User, and Thief. Advanced Fantasy adds more classes and a separate Race selection (coming soon)." title="Classic Fantasy uses the standard B/X classes: Cleric, Dwarf, Elf, Fighter, Halfling, Magic-User, and Thief. Advanced Fantasy adds more classes and a separate Race selection (coming soon)."><span class="help" title="Classic Fantasy uses the standard B/X classes: Cleric, Dwarf, Elf, Fighter, Halfling, Magic-User, and Thief. Advanced Fantasy adds more classes and a separate Race selection (coming soon).">?</span>#9432;</span></label>
            <select name="ruleset" id="ruleset">
              <option value="classic" selected>Classic Fantasy (B/X)</option>
              <option value="advanced" disabled title="Coming soon">Advanced Fantasy (coming soon)</option>
            </select>
          </div>

          <div class="option-group">
            <label>Class <span class="help" tabindex="0" aria-label="Random class picks from classes where your ability scores give the best XP bonus. Choose class lets you pick a specific class and rolls ability scores optimized for it." title="Random class picks from classes where your ability scores give the best XP bonus. Choose class lets you pick a specific class and rolls ability scores optimized for it."><span class="help" title="Random class picks from classes where your ability scores give the best XP bonus. Choose class lets you pick a specific class and rolls ability scores optimized for it.">?</span>#9432;</span></label>
            <select name="class_selection" id="class_selection">
              <option value="random">Random class</option>
              <option value="Cleric">Cleric</option>
              <option value="Dwarf">Dwarf</option>
              <option value="Elf">Elf</option>
              <option value="Fighter">Fighter</option>
              <option value="Halfling">Halfling</option>
              <option value="Magic-User">Magic-User</option>
              <option value="Thief">Thief</option>
            </select>
          </div>

          <div class="option-group">
            <label>Dice Method <span class="help" tabindex="0" aria-label="In order: rolls are assigned to stats in fixed sequence (STR→INT→WIS→DEX→CON→CHA). Optimized (choose class only): highest roll(s) go to the class prime requisite(s), rest assigned randomly. 4d6 drop lowest gives higher average scores than 3d6." title="In order: rolls are assigned to stats in fixed sequence (STR→INT→WIS→DEX→CON→CHA). Optimized (choose class only): highest roll(s) go to the class prime requisite(s), rest assigned randomly. 4d6 drop lowest gives higher average scores than 3d6."><span class="help" title="In order: rolls are assigned to stats in fixed sequence (STR→INT→WIS→DEX→CON→CHA). Optimized (choose class only): highest roll(s) go to the class prime requisite(s), rest assigned randomly. 4d6 drop lowest gives higher average scores than 3d6.">?</span>#9432;</span></label>
            <select name="dice_method" id="dice_method">
              <option value="3d6_order">3d6 in order</option>
              <option value="4d6_order_drop_lowest">4d6 in order, drop lowest</option>
            </select>
          </div>

          <div class="option-group" id="alignment-group">
            <label>Alignment <span class="help" tabindex="0" aria-label="Check which alignments are allowed. The generator picks randomly among checked options. Leave blank to omit alignment from the sheet entirely." title="Check which alignments are allowed. The generator picks randomly among checked options. Leave blank to omit alignment from the sheet entirely."><span class="help" title="Check which alignments are allowed. The generator picks randomly among checked options. Leave blank to omit alignment from the sheet entirely.">?</span>#9432;</span></label>
            <div class="alignment-controls">
              <label class="toggle alignment-blank-toggle">
                <input type="checkbox" name="alignment_blank" id="alignment_blank">
                <span>Leave alignment blank</span>
              </label>
              <div id="alignment-options" class="alignment-checkboxes">
                <label class="toggle"><input type="checkbox" name="align_lawful" id="align_lawful" checked> <span>Lawful</span></label>
                <label class="toggle"><input type="checkbox" name="align_neutral" id="align_neutral" checked> <span>Neutral</span></label>
                <label class="toggle"><input type="checkbox" name="align_chaotic" id="align_chaotic"> <span>Chaotic</span></label>
              </div>
            </div>
          </div>

          <div class="option-group">
            <label>Equipment <span class="help" tabindex="0" aria-label="Auto kit selects appropriate starting gear for the class. Manual shopping (coming soon) will let you pick items yourself." title="Auto kit selects appropriate starting gear for the class. Manual shopping (coming soon) will let you pick items yourself."><span class="help" title="Auto kit selects appropriate starting gear for the class. Manual shopping (coming soon) will let you pick items yourself.">?</span>#9432;</span></label>
            <select name="equipment_mode" id="equipment_mode">
              <option value="auto">Auto (class kit)</option>
              <option value="manual" disabled title="Coming soon">Manual shopping (coming soon)</option>
            </select>
          </div>

          <div class="option-group toggles">
            <label class="toggle">
              <input type="checkbox" name="reroll_low_hp" id="reroll_low_hp">
              <span>Reroll 1s &amp; 2s at 1st level <span class="help" tabindex="0" aria-label="If the HP die rolls a 1 or 2, roll again and take the higher result. Applies at 1st level only." title="If the HP die rolls a 1 or 2, roll again and take the higher result. Applies at 1st level only."><span class="help" title="If the HP die rolls a 1 or 2, roll again and take the higher result. Applies at 1st level only.">?</span>#9432;</span></span>
            </label>
            <label class="toggle">
              <input type="checkbox" name="reroll_subpar" id="reroll_subpar" checked>
              <span>Reroll if all stats ≤ 8 <span class="help" tabindex="0" aria-label="If every ability score is 8 or lower, the entire character is rerolled. Helps avoid unplayably weak characters." title="If every ability score is 8 or lower, the entire character is rerolled. Helps avoid unplayably weak characters."><span class="help" title="If every ability score is 8 or lower, the entire character is rerolled. Helps avoid unplayably weak characters.">?</span>#9432;</span></span>
            </label>
            <label class="toggle">
              <input type="checkbox" name="give_read_magic" id="give_read_magic">
              <span>Give spellcasters Read Magic <span class="help" tabindex="0" aria-label="Magic-Users and Elves automatically receive Read Magic as their guaranteed known spell. Their random spell is drawn from the remaining 11 spells." title="Magic-Users and Elves automatically receive Read Magic as their guaranteed known spell. Their random spell is drawn from the remaining 11 spells."><span class="help" title="Magic-Users and Elves automatically receive Read Magic as their guaranteed known spell. Their random spell is drawn from the remaining 11 spells.">?</span>#9432;</span></span>
            </label>
            <label class="toggle coming-soon">
              <input type="checkbox" name="magic_items" id="magic_items" disabled>
              <span title="Coming soon">Include magic items</span>
            </label>
            <label class="toggle coming-soon">
              <input type="checkbox" name="multiple_characters" id="multiple_characters" disabled>
              <span title="Coming soon">Generate party (4 characters)</span>
            </label>
          </div>

        </div>

        <button type="submit" id="generate-btn" class="btn-generate">
          🎲 Generate Character
        </button>
      </form>

      <div id="result" class="result hidden">
        <div class="result-header">
          <h2 id="result-title">Character Generated</h2>
          <a id="download-link" class="btn-download" href="#" download>📄 Download PDF</a>
        </div>

        <div class="stat-block">
          <div class="stat-row identity">
            <span class="stat-label">Class</span><span id="r-class" class="stat-value big"></span>
            <span class="stat-label">Title</span><span id="r-title" class="stat-value"></span>
            <span class="stat-label">Alignment</span><span id="r-alignment" class="stat-value"></span>
            <span class="stat-label">HP</span><span id="r-hp" class="stat-value big"></span>
            <span class="stat-label">AC</span><span id="r-ac" class="stat-value big"></span>
          </div>

          <div class="abilities">
            <div class="ability" id="r-str"><span class="ab-name">STR</span><span class="ab-score"></span><span class="ab-mod"></span></div>
            <div class="ability" id="r-int"><span class="ab-name">INT</span><span class="ab-score"></span><span class="ab-mod"></span></div>
            <div class="ability" id="r-wis"><span class="ab-name">WIS</span><span class="ab-score"></span><span class="ab-mod"></span></div>
            <div class="ability" id="r-dex"><span class="ab-name">DEX</span><span class="ab-score"></span><span class="ab-mod"></span></div>
            <div class="ability" id="r-con"><span class="ab-name">CON</span><span class="ab-score"></span><span class="ab-mod"></span></div>
            <div class="ability" id="r-cha"><span class="ab-name">CHA</span><span class="ab-score"></span><span class="ab-mod"></span></div>
          </div>

          <div class="saves-block">
            <h3>Saving Throws</h3>
            <div class="saves">
              <div><label>Death</label><span id="r-save-d"></span></div>
              <div><label>Wands</label><span id="r-save-w"></span></div>
              <div><label>Paralysis</label><span id="r-save-p"></span></div>
              <div><label>Breath</label><span id="r-save-b"></span></div>
              <div><label>Spells</label><span id="r-save-s"></span></div>
            </div>
          </div>

          <div class="equipment-block">
            <h3>Equipment</h3>
            <div class="equip-cols">
              <div>
                <h4>Equipped</h4>
                <ul id="r-equipped"></ul>
              </div>
              <div>
                <h4>Packed</h4>
                <ul id="r-packed"></ul>
              </div>
            </div>
          </div>

          <div class="notes-block">
            <h3>Notes &amp; Abilities</h3>
            <p id="r-abilities"></p>
            <p id="r-notes"></p>
          </div>
        </div>
      </div>

      <div id="error-msg" class="error hidden"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
